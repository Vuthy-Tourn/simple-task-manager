name: TaskManager Fullstack GitOps CI

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_frontend:
        description: "Build & Push Frontend"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      build_backend:
        description: "Build & Push Backend"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

env:
  FE_IMAGE: vuthytourn/taskmanager-frontend
  BE_IMAGE: vuthytourn/taskmanager-backend
  GITOPS_REPO: https://github.com/Vuthy-Tourn/taskmanager-helm.git
  GITOPS_BRANCH: main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ========================
      # Checkout App Repo
      # ========================
      - name: Checkout Application Repository
        uses: actions/checkout@v4

      # ========================
      # Set Image Tag
      # ========================
      - name: Set IMAGE_TAG
        id: vars
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "IMAGE_TAG=sha-$SHORT_SHA" >> $GITHUB_ENV
          echo "Using IMAGE_TAG=sha-$SHORT_SHA"

      # ========================
      # Setup Node
      # ========================
      - name: Setup Node 18
        if: ${{ github.event.inputs.build_frontend != 'false' }}
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ========================
      # FRONTEND
      # ========================
      - name: Frontend - Install
        if: ${{ github.event.inputs.build_frontend != 'false' }}
        working-directory: frontend
        run: npm ci

      - name: Frontend - TypeScript Check
        if: ${{ github.event.inputs.build_frontend != 'false' }}
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Frontend - ESLint
        if: ${{ github.event.inputs.build_frontend != 'false' }}
        working-directory: frontend
        run: npm run lint

      - name: Login to DockerHub (Frontend)
        if: ${{ github.event.inputs.build_frontend != 'false' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build & Push Frontend Image
        if: ${{ github.event.inputs.build_frontend != 'false' }}
        working-directory: frontend
        run: |
          docker build -t $FE_IMAGE:$IMAGE_TAG -t $FE_IMAGE:latest .
          docker push $FE_IMAGE:$IMAGE_TAG
          docker push $FE_IMAGE:latest

      # ========================
      # BACKEND (Spring Boot + Gradle)
      # ========================
      - name: Backend - Test
        if: ${{ github.event.inputs.build_backend != 'false' }}
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew test

      - name: Backend - Build Jar
        if: ${{ github.event.inputs.build_backend != 'false' }}
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew clean bootJar -x test

      - name: Login to DockerHub (Backend)
        if: ${{ github.event.inputs.build_backend != 'false' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build & Push Backend Image
        if: ${{ github.event.inputs.build_backend != 'false' }}
        working-directory: backend
        run: |
          docker build -t $BE_IMAGE:$IMAGE_TAG -t $BE_IMAGE:latest .
          docker push $BE_IMAGE:$IMAGE_TAG
          docker push $BE_IMAGE:latest

      # ========================
      # Install yq
      # ========================
      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      # ========================
      # Update GitOps Repo
      # ========================
      - name: Clone GitOps Repo
        run: |
          git clone https://${{ secrets.GIT_USER }}:${{ secrets.GIT_PASS }}@github.com/Vuthy-Tourn/taskmanager-helm.git taskmanager-helm

      - name: Update values-prod.yaml
        working-directory: taskmanager-helm
        run: |
          git checkout $GITOPS_BRANCH
          git pull origin $GITOPS_BRANCH

          if [ ! -f ./umbrella-chart/values-prod.yaml ]; then
            echo "values-prod.yaml not found!"
            exit 1
          fi

          if [ "${{ github.event.inputs.build_frontend }}" != "false" ]; then
            yq e -i '.frontend.image.tag = "'$IMAGE_TAG'"' ./umbrella-chart/values-prod.yaml
          fi

          if [ "${{ github.event.inputs.build_backend }}" != "false" ]; then
            yq e -i '.backend.image.tag = "'$IMAGE_TAG'"' ./umbrella-chart/values-prod.yaml
          fi

          git config user.email "github-actions@ci.local"
          git config user.name "github-actions"

          git add ./umbrella-chart/values-prod.yaml
          git commit -m "ci: update image tag to $IMAGE_TAG [skip ci]" || echo "No changes"
          git push origin $GITOPS_BRANCH

      # ========================
      # Summary
      # ========================
      - name: Summary
        run: |
          echo "Frontend image: $FE_IMAGE:$IMAGE_TAG"
          echo "Backend image:  $BE_IMAGE:$IMAGE_TAG"
          echo "GitOps repo updated."
          echo "Argo CD will auto-sync."